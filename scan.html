<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆速スキャナー</title>
    <style>
        /* 使いやすさを重視したダーク＆シンプルUI */
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* カメラエリア */
        #camera-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 撮影ガイド（書類を合わせる目安） */
        .guide-frame { position: absolute; width: 80%; height: 70%; border: 3px dashed rgba(255, 255, 255, 0.6); border-radius: 10px; pointer-events: none; box-sizing: border-box; }
        
        /* サムネイルギャラリー（連続撮影用） */
        #gallery { height: 90px; background: #2c2c2c; display: flex; align-items: center; padding: 0 15px; gap: 10px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #444; }
        .thumb { height: 70px; width: 50px; object-fit: cover; border-radius: 5px; border: 2px solid #555; background: #fff; }
        
        /* コントロールエリア */
        #controls { padding: 20px; display: flex; justify-content: space-between; align-items: center; background-color: #1a1a1a; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        
        /* トグルスイッチ（白黒/カラー） */
        .toggle-label { font-size: 14px; display: flex; align-items: center; gap: 5px; color: #ccc; }
        input[type="checkbox"] { transform: scale(1.5); accent-color: #007aff; }

        /* シャッターボタン */
        #shutter-btn { width: 70px; height: 70px; border-radius: 50%; background: white; border: 4px solid #aaa; outline: 4px solid white; cursor: pointer; transition: 0.1s; display: flex; justify-content: center; align-items: center; }
        #shutter-btn:active { background: #ccc; transform: scale(0.95); }
        
        /* 保存ボタン */
        #save-btn { background: #007aff; color: white; border: none; padding: 12px 20px; border-radius: 20px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #save-btn:active { background: #005bb5; }
        #save-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="camera-area">
        <video id="video" autoplay playsinline></video>
        <div class="guide-frame"></div>
    </div>

    <div id="gallery">
        </div>

    <div id="controls">
        <label class="toggle-label">
            <input type="checkbox" id="bw-filter" checked> 白黒化
        </label>
        <div id="shutter-btn"></div>
        <button id="save-btn" disabled>保存 (0)</button>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gallery = document.getElementById('gallery');
        const shutterBtn = document.getElementById('shutter-btn');
        const saveBtn = document.getElementById('save-btn');
        const bwFilter = document.getElementById('bw-filter');

        let capturedImages = []; // 撮影した画像を保持する配列

        // 1. カメラの起動（背面カメラを優先）
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("カメラの起動に失敗しました。権限を確認してください。");
                console.error(err);
            }
        }

        // 2. 撮影＆画像処理（シャッターボタン）
        shutterBtn.addEventListener('click', () => {
            // 動画のサイズに合わせてキャンバスを設定
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // キャンバスに現在の映像を描画
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 白黒フィルターの適用（容量削減）
            if (bwFilter.checked) {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    // グレースケール計算 (人間の目の感度に基づく重み付け)
                    const avg = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                    data[i] = avg;     // Red
                    data[i + 1] = avg; // Green
                    data[i + 2] = avg; // Blue
                    // data[i+3] (Alpha) はそのまま
                }
                ctx.putImageData(imageData, 0, 0);
            }

            // 画質をやや落として軽量なJPEG化（0.7 = 中画質）
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            capturedImages.push(dataUrl);

            // ギャラリーにサムネイルを追加
            const img = document.createElement('img');
            img.src = dataUrl;
            img.className = 'thumb';
            gallery.appendChild(img);
            
            // 最新の画像が見えるようにスクロール
            gallery.scrollLeft = gallery.scrollWidth;

            // 保存ボタンの更新
            saveBtn.textContent = `保存 (${capturedImages.length})`;
            saveBtn.disabled = false;
        });

        // 3. 一括保存機能
        saveBtn.addEventListener('click', () => {
            if (capturedImages.length === 0) return;

            // 日付からベースのファイル名を作成 (例: 20260610_150347)
            const now = new Date();
            const dateStr = now.getFullYear().toString() + 
                            (now.getMonth()+1).toString().padStart(2, '0') + 
                            now.getDate().toString().padStart(2, '0') + "_" + 
                            now.getHours().toString().padStart(2, '0') + 
                            now.getMinutes().toString().padStart(2, '0');

            // スマホブラウザの制限を考慮し、1枚ずつダウンロード処理を走らせる
            capturedImages.forEach((dataUrl, index) => {
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = `Scan_${dateStr}_${(index + 1).toString().padStart(3, '0')}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });

            // 保存完了後、確認を出してリセットするか選ばせることも可能ですが
            // 今回はシンプルにアラートのみ
            alert(`${capturedImages.length}枚の画像をダウンロードしました！`);
        });

        // 初期化
        startCamera();
    </script>
</body>
</html>
